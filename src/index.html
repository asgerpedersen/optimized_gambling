    <title>Document</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Introduction Scene-->
     <div class="scene active info" id="scene-intro">
        <p>Welcome to the experiment blablabla</p>
     </div>

    <!-- Instruction Auto-->
     <div class="scene info" id="scene-instruction-auto">
        <p>Instructions Auto</p>
     </div>
    
    <!-- Instruction Press-->
     <div class="scene info" id="scene-instruction-manual">
        <p>Instructions Manual</p>
     </div>

    <!-- Extra spins? -->
     <div class="scene info" id="scene-extra-spins?">
        <p>Your current balance is <span id="balance-display">0</span><br>
        Buy five extra spins? </p>
     </div>

    

    <!-- Slots scene -->
    <div class="scene" id="scene-slots">
        <div class="slots">
            <div class="reel"></div>
            <div class="reel"></div>
            <div class="reel"></div>
        </div>
    </div>
